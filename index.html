<!-- BUILD: v1.16.7 -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#06c755" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>已讀不回</title>
  <style>
    :root{
      --line:#06c755;
      --line-dark:#05a948;
      --chat-bg:#8cabd0;
      --mine:#9de65c;
      --other:#fff;
      --ink:#1b1d22;
      --muted:#68717b;
      --danger:#b70018;
      --panel:#f6f7f8;
      --shadow:0 12px 30px rgba(0,0,0,.18);
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif;background:#111;color:var(--ink)}
    body{
      min-height:100svh;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 10%,rgba(6,199,85,.13),transparent 28%),
        radial-gradient(circle at 80% 90%,rgba(125,0,18,.18),transparent 35%),
        #111;
    }

    button,input{font:inherit}
    button{cursor:pointer}

    .phone{
      width:min(100vw,460px);
      height:min(100svh,900px);
      background:#fff;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      position:relative;
      overflow:hidden;
    }

    @media (min-width:560px){
      .phone{height:min(92svh,900px);border-radius:24px;border:8px solid #252525}
    }


    .chat-tabs{
      height:42px;
      flex:0 0 auto;
      display:grid;
      grid-template-columns:1fr 1fr;
      background:#f6f7f8;
      border-bottom:1px solid #d9dde1;
      position:relative;
      z-index:4;
    }

    .chat-tab{
      border:0;
      background:transparent;
      color:#747c85;
      font-size:13px;
      font-weight:750;
      position:relative;
      padding:0 12px;
    }

    .chat-tab.active{
      color:#14171b;
      background:#fff;
    }

    .chat-tab.active::after{
      content:"";
      position:absolute;
      left:25%;
      right:25%;
      bottom:0;
      height:3px;
      border-radius:999px 999px 0 0;
      background:var(--line);
    }

    .unread-badge{
      display:none;
      min-width:17px;
      height:17px;
      padding:0 5px;
      margin-left:5px;
      border-radius:999px;
      background:#e00025;
      color:#fff;
      font-size:10px;
      line-height:17px;
      vertical-align:1px;
      box-shadow:0 1px 4px rgba(130,0,15,.25);
    }

    .unread-badge.show{
      display:inline-block;
    }

    .thread{
      display:none;
    }

    .thread.active{
      display:block;
    }

    .header .avatar.friend-avatar{
      background:
        radial-gradient(circle at 50% 36%,#f2d6c5 0 23%,transparent 24%),
        radial-gradient(circle at 50% 68%,#6f4b3c 0 32%,transparent 33%),
        linear-gradient(145deg,#ffd6e4,#a05a75);
    }

    .chat-switch-flash{
      animation:chatSwitch .22s ease-out;
    }

    @keyframes chatSwitch{
      from{opacity:.35;transform:translateX(8px)}
      to{opacity:1;transform:none}
    }

    .statusbar{
      height:28px;
      padding:0 14px;
      background:#050505;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-size:12px;
      letter-spacing:.04em;
      flex:0 0 auto;
    }

    .header{
      height:64px;
      background:var(--line);
      color:#fff;
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      box-shadow:0 2px 8px rgba(0,0,0,.12);
      position:relative;
      z-index:5;
      flex:0 0 auto;
    }

    .back{
      font-size:28px;
      line-height:1;
      opacity:.95;
      transform:translateY(-1px);
    }

    .avatar{
      width:42px;height:42px;border-radius:50%;
      background:
        radial-gradient(circle at 50% 35%,#f0d2c1 0 23%,transparent 24%),
        radial-gradient(circle at 50% 64%,#34383f 0 31%,transparent 32%),
        linear-gradient(145deg,#cad0d8,#6e7784);
      border:2px solid rgba(255,255,255,.8);
      box-shadow:0 2px 6px rgba(0,0,0,.18);
      flex:0 0 auto;
    }

    .profile{min-width:0;flex:1}
    .profile-name{font-weight:750;font-size:16px;display:flex;align-items:center;gap:6px}
    .profile-sub{font-size:11px;opacity:.88;margin-top:2px}
    .online-dot{width:8px;height:8px;background:#e7ff80;border-radius:50%;box-shadow:0 0 8px #e7ff80}

    .header-actions{display:flex;gap:12px;font-size:20px;align-items:center}
    .icon-btn{
      background:transparent;border:0;color:#fff;padding:4px;
      width:30px;height:30px;border-radius:50%;
    }
    .icon-btn:hover{background:rgba(255,255,255,.15)}

    .chat{
      flex:1;
      min-height:0;
      overflow-y:auto;
      padding:14px 12px 28px;
      scroll-behavior:smooth;
      background:
        linear-gradient(rgba(140,171,208,.92),rgba(140,171,208,.92)),
        repeating-linear-gradient(45deg,rgba(255,255,255,.08) 0 1px,transparent 1px 13px);
      position:relative;
    }

    .chat.glitch{
      animation:glitchBg .16s linear 3;
    }


    .row.spam{
      margin:3px 0;
      animation-duration:.1s;
    }

    .row.spam .bubble{
      border-color:rgba(183,0,24,.58);
      box-shadow:0 0 16px rgba(183,0,24,.22);
      font-weight:700;
    }

    .row.spam:nth-of-type(3n) .bubble{
      font-size:17px;
    }

    .chat.panic-mode{
      background:
        linear-gradient(rgba(120,135,155,.94),rgba(85,96,112,.94)),
        repeating-linear-gradient(90deg,rgba(120,0,18,.14) 0 1px,transparent 1px 8px);
    }

    @keyframes glitchBg{
      0%{filter:none;transform:none}
      25%{filter:hue-rotate(16deg) contrast(1.15);transform:translateX(2px)}
      50%{filter:saturate(.6) contrast(1.3);transform:translateX(-2px)}
      100%{filter:none;transform:none}
    }

    .date-pill,.system-note{
      width:max-content;
      max-width:86%;
      margin:10px auto;
      padding:5px 10px;
      border-radius:14px;
      font-size:10px;
      color:#fff;
      background:rgba(53,70,91,.45);
      text-align:center;
      backdrop-filter:blur(4px);
    }

    .system-note.danger{
      background:rgba(104,0,12,.65);
      animation:pulse 1.3s ease-in-out infinite;
    }

    @keyframes pulse{
      50%{box-shadow:0 0 0 5px rgba(183,0,24,.13)}
    }

    .row{
      display:flex;
      align-items:flex-end;
      gap:7px;
      margin:9px 0;
      animation:messageIn .24s ease-out both;
    }
    .row.mine{justify-content:flex-end}
    .row.other{justify-content:flex-start}

    @keyframes messageIn{
      from{opacity:0;transform:translateY(8px) scale(.98)}
      to{opacity:1;transform:none}
    }

    .mini-avatar{
      width:30px;height:30px;border-radius:50%;
      background:
        radial-gradient(circle at 50% 35%,#f0d2c1 0 23%,transparent 24%),
        radial-gradient(circle at 50% 64%,#34383f 0 31%,transparent 32%),
        linear-gradient(145deg,#cad0d8,#6e7784);
      flex:0 0 auto;
    }

    .bubble-wrap{max-width:75%;display:flex;align-items:flex-end;gap:5px}
    .row.mine .bubble-wrap{flex-direction:row-reverse}

    .bubble{
      padding:9px 12px;
      border-radius:17px;
      font-size:15px;
      line-height:1.48;
      white-space:pre-wrap;
      word-break:break-word;
      position:relative;
      box-shadow:0 1px 2px rgba(0,0,0,.09);
    }

    .other .bubble{background:var(--other);border-top-left-radius:5px}
    .mine .bubble{background:var(--mine);border-top-right-radius:5px}

    .bubble.creepy{
      color:#3b0008;
      border:1px solid rgba(183,0,24,.26);
      box-shadow:0 0 18px rgba(183,0,24,.13);
    }

    .meta{
      font-size:9px;
      color:#ecf1f6;
      text-shadow:0 1px 2px rgba(0,0,0,.45);
      white-space:nowrap;
      line-height:1.15;
      padding-bottom:2px;
      text-align:right;
    }

    .typing{
      width:58px;
      height:34px;
      padding:0 12px;
      display:flex;
      align-items:center;
      gap:4px;
    }
    .typing span{
      width:6px;height:6px;background:#8c9299;border-radius:50%;
      animation:typing 1s infinite ease-in-out;
    }
    .typing span:nth-child(2){animation-delay:.15s}
    .typing span:nth-child(3){animation-delay:.3s}
    @keyframes typing{
      0%,70%,100%{transform:translateY(0);opacity:.45}
      35%{transform:translateY(-4px);opacity:1}
    }

    .attachment{
      background:#fff;
      border-radius:14px;
      overflow:hidden;
      width:min(245px,70vw);
      box-shadow:0 2px 7px rgba(0,0,0,.14);
    }
    .attachment-img{
      height:140px;
      display:grid;
      place-items:center;
      background:
        linear-gradient(rgba(0,0,0,.05),rgba(0,0,0,.28)),
        radial-gradient(circle at 68% 40%,#f7ddca 0 12px,transparent 13px),
        linear-gradient(90deg,#222 0 14%,#786b60 14% 18%,#c6b69d 18% 82%,#443d37 82%);
      color:#fff;
      font-size:42px;
      position:relative;
    }
    .attachment-img::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg,transparent 49%,rgba(255,255,255,.35) 50%,transparent 51%),
        linear-gradient(transparent 49%,rgba(255,255,255,.35) 50%,transparent 51%);
      background-size:33.333% 33.333%;
      opacity:.15;
    }
    .attachment-caption{padding:9px 10px;font-size:12px;color:#4a4f55}

    .choice-area{
      flex:0 0 auto;
      background:rgba(246,247,248,.98);
      border-top:1px solid #d9dde1;
      padding:10px 10px calc(10px + env(safe-area-inset-bottom));
      display:grid;
      gap:8px;
      max-height:36%;
      overflow:auto;
    }

    .choice-title{
      font-size:11px;
      color:#7d858e;
      text-align:center;
      letter-spacing:.08em;
    }


    .custom-reply{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .custom-reply-input{
      min-width:0;
      flex:1;
      border:1px solid #cfd5da;
      background:#fff;
      border-radius:12px;
      padding:11px 12px;
      color:#20242a;
      outline:none;
    }

    .custom-reply-input:focus{
      border-color:var(--line);
      box-shadow:0 0 0 3px rgba(6,199,85,.12);
    }

    .custom-reply-send{
      flex:0 0 auto;
      border:0;
      border-radius:12px;
      padding:11px 14px;
      background:var(--line);
      color:#fff;
      font-weight:750;
    }

    .custom-reply-hint{
      margin-top:7px;
      color:#7d858e;
      font-size:10px;
      text-align:center;
    }

    .choice-btn{
      border:1px solid #cfd5da;
      background:#fff;
      color:#20242a;
      border-radius:13px;
      padding:11px 12px;
      text-align:left;
      line-height:1.35;
      transition:.15s ease;
      box-shadow:0 1px 3px rgba(0,0,0,.06);
    }
    .choice-btn:hover{border-color:var(--line);transform:translateY(-1px)}
    .choice-btn:active{transform:translateY(1px)}
    .choice-btn.danger{border-color:#d8a8ae;color:#71000e}

    .composer{
      height:54px;
      background:#f7f7f7;
      border-top:1px solid #ddd;
      display:flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      flex:0 0 auto;
    }
    .composer .fake-input{
      flex:1;background:#fff;border:1px solid #d7d7d7;border-radius:18px;
      color:#aaa;padding:8px 12px;font-size:13px;
    }
    .composer-icon{font-size:20px;color:#6d737b}

    .overlay{
      position:absolute;inset:0;
      background:rgba(7,8,10,.82);
      display:grid;
      place-items:center;
      z-index:20;
      padding:22px;
      backdrop-filter:blur(8px);
    }
    .overlay.hidden{display:none}


    #startOverlay .card{
      padding:22px;
    }

    #startOverlay .name-input{
      margin:0;
    }

    .card{
      width:min(100%,360px);
      background:#fff;
      border-radius:18px;
      padding:24px;
      box-shadow:0 22px 60px rgba(0,0,0,.4);
      text-align:center;
    }


    .card h1{font-size:26px;margin:0 0 8px}
    .card p{font-size:14px;line-height:1.65;color:#5d6670;margin:0 0 18px}

    .voice-settings{
      margin-top:12px;
      border:1px solid #dce1e5;
      border-radius:12px;
      background:#f7f8f9;
      text-align:left;
      overflow:hidden;
    }

    .voice-settings summary{
      padding:10px 12px;
      cursor:pointer;
      font-size:12px;
      font-weight:750;
      color:#606871;
      list-style:none;
    }

    .voice-settings summary::-webkit-details-marker{display:none}

    .voice-settings[open] summary{
      border-bottom:1px solid #e2e6e9;
    }

    .voice-setting-row{
      display:grid;
      grid-template-columns:34px 1fr 32px;
      gap:7px;
      align-items:center;
      padding:8px 10px;
    }

    .voice-setting-row + .voice-setting-row{
      padding-top:2px;
      padding-bottom:10px;
    }

    .voice-setting-row label{
      font-size:11px;
      color:#68717a;
      font-weight:700;
    }

    .voice-setting-row select{
      min-width:0;
      width:100%;
      border:1px solid #d4d9de;
      border-radius:8px;
      background:#fff;
      padding:7px 8px;
      font-size:11px;
      color:#30353a;
    }

    .voice-preview{
      width:30px;
      height:30px;
      border:0;
      border-radius:50%;
      background:#343a40;
      color:#fff;
      display:grid;
      place-items:center;
      padding-left:2px;
    }



    .name-voice-row select{
      min-width:0;
      border:1.5px solid #d7dde2;
      border-radius:12px;
      background:#fff;
      padding:8px;
      font-size:12px;
      color:#40464d;
    }

    .name-input{
      width:100%;
      border:1.5px solid #d7dde2;
      border-radius:12px;
      padding:12px 13px;
      outline:none;
      text-align:center;
      font-size:16px;
    }
    .name-input:focus{border-color:var(--line);box-shadow:0 0 0 4px rgba(6,199,85,.12)}
    .primary{
      width:100%;
      border:0;
      border-radius:12px;
      background:var(--line);
      color:#fff;
      font-weight:750;
      padding:12px 15px;
      margin-top:12px;
    }
    .primary:hover{background:var(--line-dark)}
    .tiny{font-size:11px!important;color:#8b929a!important;margin-top:12px!important}

    #endingOverlay{
      padding:14px;
    }

    .ending-card{
      width:min(100%,360px);
      max-height:calc(100% - 8px);
      background:linear-gradient(180deg,#fff,#f3f4f5);
      position:relative;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      padding:22px 20px 18px;
    }

    .ending-card::before{
      content:"";
      position:absolute;
      inset:-30% auto auto -20%;
      width:180px;
      height:180px;
      border-radius:50%;
      background:rgba(183,0,24,.08);
      pointer-events:none;
    }


    .ending-type{
      position:relative;
      z-index:1;
      align-self:center;
      flex:0 0 auto;
      margin-bottom:8px;
      padding:5px 11px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.12em;
      color:#fff;
      background:#565d66;
    }

    .ending-card.good .ending-type{background:#08783d}
    .ending-card.bad .ending-type{background:#970018}
    .ending-card.neutral .ending-type{background:#565d66}

    .ending-card h2{
      position:relative;
      z-index:1;
      flex:0 0 auto;
      margin:0 0 12px;
      font-size:24px;
      text-align:center;
    }

    #endingText{
      position:relative;
      z-index:1;
      flex:1 1 auto;
      min-height:0;
      overflow-y:auto;
      overscroll-behavior:contain;
      scrollbar-gutter:stable;
      scrollbar-width:thin;
      scrollbar-color:#aeb4ba transparent;
      white-space:pre-wrap;
      text-align:left;
      font-size:14px;
      line-height:1.72;
      color:#505862;
      margin:0 0 14px;
      padding:2px 8px 12px 2px;
      -webkit-mask-image:linear-gradient(
        to bottom,
        transparent 0,
        #000 10px,
        #000 calc(100% - 18px),
        transparent 100%
      );
      mask-image:linear-gradient(
        to bottom,
        transparent 0,
        #000 10px,
        #000 calc(100% - 18px),
        transparent 100%
      );
    }

    #endingText::-webkit-scrollbar{
      width:5px;
    }

    #endingText::-webkit-scrollbar-track{
      background:transparent;
    }

    #endingText::-webkit-scrollbar-thumb{
      background:#aeb4ba;
      border-radius:999px;
    }

    #endingCard .primary{
      position:relative;
      z-index:1;
      flex:0 0 auto;
      margin-top:0;
      box-shadow:0 -10px 22px rgba(243,244,245,.9);
    }

    .ending-stats{
      margin:14px 0;
      padding:10px;
      background:#eceff1;
      border-radius:11px;
      font-size:12px;
      color:#535b65;
    }

    .secondary{
      width:100%;
      border:1px solid #cfd5da;
      border-radius:12px;
      background:#fff;
      padding:11px 14px;
      font-weight:700;
    }

    .screen-flash{
      position:absolute;inset:0;background:#8c0013;z-index:18;
      pointer-events:none;opacity:0;
    }
    .screen-flash.active{animation:flash .55s ease-out}
    @keyframes flash{
      0%{opacity:0}
      18%{opacity:.7}
      100%{opacity:0}
    }



    .row.voice-row{
      margin:9px 0;
    }

    .voice-message{
      min-width:184px;
      padding:9px 12px!important;
      white-space:normal;
      cursor:pointer;
      user-select:none;
      border-radius:17px!important;
    }

    .other .voice-message{
      border-top-left-radius:5px!important;
    }

    .voice-sender,
    .voice-hint{
      display:none;
    }

    .voice-main{
      display:flex;
      align-items:center;
      gap:8px;
      min-height:22px;
    }

    .voice-play{
      width:18px;
      height:22px;
      flex:0 0 18px;
      border:0;
      background:transparent!important;
      box-shadow:none!important;
      padding:0;
      margin:0;
      font-size:0;
      line-height:0;
      position:relative;
      display:block;
    }

    .voice-play::before{
      content:"";
      position:absolute;
      left:4px;
      top:50%;
      transform:translateY(-50%);
      width:0;
      height:0;
      border-top:6px solid transparent;
      border-bottom:6px solid transparent;
      border-left:9px solid #343a40;
    }

    .voice-message.creepy .voice-play::before{
      border-left-color:#820010;
    }

    .voice-message.playing .voice-play::before{
      left:3px;
      width:10px;
      height:12px;
      border:0;
      transform:translateY(-50%);
      background:
        linear-gradient(
          90deg,
          #343a40 0 3px,
          transparent 3px 7px,
          #343a40 7px 10px
        );
    }

    .voice-message.creepy.playing .voice-play::before{
      background:
        linear-gradient(
          90deg,
          #820010 0 3px,
          transparent 3px 7px,
          #820010 7px 10px
        );
    }

    .voice-wave{
      height:22px;
      flex:1;
      display:flex;
      align-items:center;
      gap:2px;
      overflow:hidden;
    }

    .voice-wave i{
      display:block;
      width:2px;
      border-radius:999px;
      background:#68717a;
      opacity:.65;
      height:var(--h);
      transform-origin:center;
    }

    .voice-message.creepy .voice-wave i{
      background:#9c0014;
    }

    .voice-time{
      font-size:10px;
      color:#737b84;
      min-width:30px;
      text-align:right;
      line-height:1;
    }

    .voice-message.playing .voice-wave i{
      animation:wavePlay .48s ease-in-out infinite alternate;
      animation-delay:calc(var(--i) * -40ms);
      opacity:1;
    }

    @keyframes wavePlay{
      from{transform:scaleY(.45)}
      to{transform:scaleY(1.18)}
    }

    .friend-avatar{
      background:
        radial-gradient(circle at 50% 36%,#f2d6c5 0 23%,transparent 24%),
        radial-gradient(circle at 50% 68%,#6f4b3c 0 32%,transparent 33%),
        linear-gradient(145deg,#ffd6e4,#a05a75)!important;
    }

    .contact-card{
      width:min(270px,74vw);
      background:rgba(255,255,255,.94);
      border-radius:13px;
      padding:10px 12px;
      border-left:4px solid #d31b43;
      box-shadow:0 2px 8px rgba(0,0,0,.13);
      font-size:12px;
      line-height:1.5;
    }

    .contact-card strong{
      display:block;
      font-size:13px;
      margin-bottom:2px;
    }


    .call-overlay{

<body>

    const state = {
      name: '',

    const endings = {
      free: {

      },

      },
      silentSOS: {
        tone: 'good',

      },

      },

      },

    function updateUnreadBadge(contact){
      const badge=contact==='yenting' ? unreadYenting : unreadXiaoqing;
      const count=unread[contact];
      badge.textContent=count>9 ? '9+' : String(count);
      badge.classList.toggle('show',count>0);
    }

    function markUnread(contact){
      if(contact===activeContact) return;
      unread[contact]++;
      updateUnreadBadge(contact);
    }

    function switchChat(contact,{clearUnread=true,animate=true}={}){
      if(!chats[contact]) return;

      activeContact=contact;
      chat=chats[contact];

      Object.entries(chats).forEach(([key,thread])=>{
        thread.classList.toggle('active',key===contact);
      });

      document.querySelectorAll('.chat-tab').forEach(tab=>{
        tab.classList.toggle('active',tab.dataset.contact===contact);
      });

      const profile=contactProfiles[contact];
      profileName.innerHTML=`${profile.name} <span class="online-dot"></span>`;
      profileSub.textContent=profile.status;
      headerAvatar.classList.toggle('friend-avatar',contact==='xiaoqing');

      if(clearUnread){
        unread[contact]=0;
        updateUnreadBadge(contact);
      }

      const waiting=chatWaiters[contact].splice(0);
      waiting.forEach(resolve=>resolve());

      if(animate){
        chat.classList.remove('chat-switch-flash');
        void chat.offsetWidth;
        chat.classList.add('chat-switch-flash');
      }

      scrollBottom();
    }

    function targetChat(contact){
      return chats[contact] || chats.yenting;
    }

    function waitForChat(contact){
      if(activeContact===contact) return Promise.resolve();
      return new Promise(resolve=>chatWaiters[contact].push(resolve));
    }

    chatTabs.addEventListener('click',event=>{
      const tab=event.target.closest('.chat-tab');
      if(!tab) return;
      switchChat(tab.dataset.contact);
    });

    let gameClockMinutes=21*60+47;
    let hasMessageAtCurrentTime=false;

    function normalizeClockMinutes(minutes){
      const day=24*60;
      return ((minutes%day)+day)%day;
    }

    function setGameTime(hour,minute){
      gameClockMinutes=normalizeClockMinutes(Number(hour)*60+Number(minute));
      hasMessageAtCurrentTime=false;
      setClock();
    }

    function advanceGameTime(minutes=1){
      gameClockMinutes=normalizeClockMinutes(gameClockMinutes+minutes);
      setClock();
    }

    function nowTime(){
      const hour=Math.floor(gameClockMinutes/60);
      const minute=gameClockMinutes%60;
      return `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
    }

    function prepareMessageTime(keepSameMinute=false){
      if(hasMessageAtCurrentTime && !keepSameMinute){
        advanceGameTime(1);
      }
      hasMessageAtCurrentTime=true;
      setClock();
      return nowTime();
    }

    function setClock(){
      document.getElementById('clock').textContent=nowTime();
    }
    setClock();

    function wait(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

    let audioCtx;
    function beep(type='message'){
      if(state.muted) return;
      try{
        audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const t = audioCtx.currentTime;

        if(type === 'message'){
          osc.type='sine';
          osc.frequency.setValueAtTime(720,t);
          osc.frequency.exponentialRampToValueAtTime(930,t+.08);
          gain.gain.setValueAtTime(.05,t);
          gain.gain.exponentialRampToValueAtTime(.001,t+.13);
          osc.start(t);osc.stop(t+.14);
        }else{
          osc.type='sawtooth';
          osc.frequency.setValueAtTime(105,t);
          osc.frequency.exponentialRampToValueAtTime(45,t+.42);
          gain.gain.setValueAtTime(.06,t);
          gain.gain.exponentialRampToValueAtTime(.001,t+.45);
          osc.start(t);osc.stop(t+.46);
        }
      }catch(e){}
    }

    function scrollBottom(contact=activeContact){
      const target=targetChat(contact);
      requestAnimationFrame(()=>target.scrollTop = target.scrollHeight);
    }

    function addSystem(text,danger=false,contact=activeContact){
      const target=targetChat(contact);
      const el=document.createElement('div');
      el.className='system-note'+(danger?' danger':'');
      el.textContent=text;
      target.appendChild(el);
      markUnread(contact);
      scrollBottom(contact);
    }

    function addDate(text,contact=activeContact){
      const target=targetChat(contact);
      const el=document.createElement('div');
      el.className='date-pill';
      el.textContent=text;
      target.appendChild(el);
      scrollBottom(contact);
    }

    function addMessage(side,text,{
      creepy=false,
      attachment=false,
      spam=false,
      keepSameMinute=false,
      contact=activeContact
    }={}){
      const target=targetChat(contact);
      const row=document.createElement('div');
      row.className=`row ${side}${spam?' spam':''}`;

      if(side==='other'){
        const av=document.createElement('div');
        av.className='mini-avatar'+(contact==='xiaoqing'?' friend-avatar':'');
        row.appendChild(av);
      }

      const wrap=document.createElement('div');
      wrap.className='bubble-wrap';

      const bubble=document.createElement('div');
      bubble.className='bubble'+(creepy?' creepy':'');
      if(attachment){
        bubble.className='attachment';
        bubble.innerHTML=`
          <div class="attachment-img">⌖</div>
          <div class="attachment-caption">${text}</div>
        `;
      }else{
        bubble.textContent=text;
      }

      const messageTimestamp=prepareMessageTime(keepSameMinute);
      const meta=document.createElement('div');
      meta.className='meta';
      meta.innerHTML=side==='mine' ? `已讀<br>${messageTimestamp}` : messageTimestamp;

      wrap.appendChild(bubble);
      wrap.appendChild(meta);
      row.appendChild(wrap);
      target.appendChild(row);
      markUnread(contact);
      scrollBottom(contact);

      if(side==='other'){
        beep(creepy?'horror':'message');
        showNotification(text.replace(/\n/g,' '),contact);
      }
    }


    let cachedVoices=[];
    let voicePlaybackToken=0;

    function refreshVoices(){
      if(!('speechSynthesis' in window)) return;
      cachedVoices=window.speechSynthesis.getVoices() || [];
      populateVoiceSelectors();
    }

    function availableUiVoices(){
      return cachedVoices
        .filter(voice=>/^zh/i.test(voice.lang || ''))
        .sort((a,b)=>a.name.localeCompare(b.name));
    }

    function safeStorageGet(key){
      try{
        return window.localStorage?.getItem(key) || '';
      }catch(error){
        return '';
      }
    }

    function safeStorageSet(key,value){
      try{
        window.localStorage?.setItem(key,value);
      }catch(error){}
    }

    function populateVoiceSelect(select,sender){
      if(!select) return;
      const previous=select.value;
      const voices=availableUiVoices();
      select.innerHTML='';

      const automatic=document.createElement('option');
      automatic.value='';
      automatic.textContent='自動選擇';
      select.appendChild(automatic);

      voices.forEach(voice=>{
        const option=document.createElement('option');
        option.value=voice.name;
        option.textContent=voice.name;
        select.appendChild(option);
      });

      const stored=safeStorageGet(`voice-${sender}`);
      const wanted=stored || previous;
      if(wanted && voices.some(voice=>voice.name===wanted)){
        select.value=wanted;
      }
    }

    if('speechSynthesis' in window){
      window.speechSynthesis.addEventListener?.('voiceschanged',refreshVoices);
    }

    function selectedVoiceName(){
      return '';
    }

    // Mobile speech engines may expose only one Chinese voice.
    // Yenting therefore uses male-name scoring plus a separate low-pitch profile.
    const maleVoicePattern=/male|man|男|YunJhe|Yunxi|Yunyang|Li-mu|Limu|Eddy|Reed|Rocko|Ralph|Daniel|Aaron|Alex|Fred|Thomas|Tom|Arthur|Albert|Bruce|Junior|Lee|Liam|Otoya|Ichiro|Takumi|Daichi|Naoki|Keita|Daisuke|雲哲|雲希|雲揚|李木/i;
    const femaleVoicePattern=/female|woman|女|HsiaoChen|Xiaoxiao|Mei-Jia|Meijia|Ting-Ting|Sin-ji|Samantha|Victoria|Karen|Moira|Kyoko|O-ren|美佳|曉辰|婷婷|小小/i;

    function voiceScore(voice,sender='彥廷',targetLang='zh-TW'){
      const name=voice.name || '';
      const lang=(voice.lang || '').toLowerCase();
      const target=targetLang.toLowerCase();
      const prefix=target.split('-')[0];
      let score=0;

      if(lang===target) score+=70;
      else if(lang.startsWith(prefix)) score+=48;

      if(voice.localService) score+=12;

      if(sender==='彥廷'){
        if(maleVoicePattern.test(name)) score+=95;
        if(femaleVoicePattern.test(name)) score-=85;
        if(/zh-tw/i.test(voice.lang || '')) score+=18;
      }else{
        if(femaleVoicePattern.test(name)) score+=70;
        if(maleVoicePattern.test(name)) score-=45;
        if(/zh-tw/i.test(voice.lang || '')) score+=18;
      }

      return score;
    }

    function bestScoredVoice(sender='彥廷',targetLang='zh-TW'){
      if(!cachedVoices.length) refreshVoices();

      return cachedVoices
        .map(voice=>({voice,score:voiceScore(voice,sender,targetLang)}))
        .sort((a,b)=>b.score-a.score)[0]?.voice;
    }

    function pickVoice(sender='彥廷'){
      const selected=selectedVoiceName(sender);
      if(selected){
        const exact=cachedVoices.find(voice=>voice.name===selected);
        if(exact) return exact;
      }

      return bestScoredVoice(sender,'zh-TW')
        || cachedVoices.find(voice=>/^zh/i.test(voice.lang || ''))
        || cachedVoices.find(voice=>voice.localService)
        || cachedVoices[0];
    }

    function detectTextLanguage(text){
      const value=(text || '').trim();
      if(/[ぁ-んァ-ヶ]/.test(value)) return 'ja-JP';

      const latin=(value.match(/[A-Za-z]/g) || []).length;
      const cjk=(value.match(/[\u3400-\u9FFF]/g) || []).length;
      if(latin>0 && latin>=Math.max(2,cjk)) return 'en-US';

      return 'zh-TW';
    }

    function pickLanguageVoice(lang,sender='彥廷'){
      return bestScoredVoice(sender,lang) || pickVoice(sender);
    }

    function normalizeVoiceText(text){
      return text
        .replace(/\s+/g,' ')
        .replace(/妳/g,'你')
        .replace(/……/g,'…')
        .trim();
    }

    function speechSegments(text,sender,language='auto'){
      const spokenName=(state.name || '').trim();
      const parts=text.split('{name}');
      const segments=[];

      parts.forEach((part,index)=>{
        if(part){
          const normalized=normalizeVoiceText(interpolate(part));
          const lang=language==='auto' ? detectTextLanguage(normalized) : language;
          segments.push({
            text:normalized,
            voice:lang.startsWith('zh') ? pickVoice(sender) : pickLanguageVoice(lang,sender),
            lang
          });
        }

        if(index<parts.length-1 && spokenName){
          const lang=detectTextLanguage(spokenName);
          segments.push({
            text:spokenName,
            voice:lang.startsWith('zh') ? pickVoice(sender) : pickLanguageVoice(lang,sender),
            lang
          });
        }
      });

      return segments.filter(segment=>segment.text);
    }

    let activeBundledYentingAudio=null;

    function canonicalYentingAudioText(text){
      let value=(text || '').replace(/\{name\}/g,'你');
      const playerName=(state.name || '').trim();

      if(playerName){
        value=value.split(playerName).join('你');
      }

      return normalizeVoiceText(value);
    }

    function hasExplicitMaleVoice(targetLang='zh-TW'){
      const prefix=targetLang.toLowerCase().split('-')[0];

      return cachedVoices.some(voice=>{
        const name=voice.name || '';
        const lang=(voice.lang || '').toLowerCase();

        return (
          lang.startsWith(prefix) &&
          maleVoicePattern.test(name) &&
          !femaleVoicePattern.test(name)
        );
      });
    }

    function stopBundledYentingAudio(){
      if(activeBundledYentingAudio){
        activeBundledYentingAudio.pause();
        activeBundledYentingAudio.currentTime=0;
        activeBundledYentingAudio=null;
      }
    }

    function bundledAudioObjectUrl(key,source){
      if(bundledYentingObjectUrls.has(key)){
        return bundledYentingObjectUrls.get(key);
      }

      try{
        const base64=source.split(',')[1] || '';
        const binary=atob(base64);
        const bytes=new Uint8Array(binary.length);

        for(let index=0;index<binary.length;index++){
          bytes[index]=binary.charCodeAt(index);
        }

        const url=URL.createObjectURL(new Blob([bytes],{type:'audio/mpeg'}));
        bundledYentingObjectUrls.set(key,url);
        return url;
      }catch(error){
        return source;
      }
    }

    function playBundledYentingVoice(text,{
      volume=.96,
      onend=()=>{},
      onerror=()=>{}
    }={}){
      const requestedKey=canonicalYentingAudioText(text);
      const key=bundledYentingAudio[requestedKey]
        ? requestedKey
        : '你，接電話。';
      const dataSource=bundledYentingAudio[key];

      if(!dataSource){
        onerror();
        return false;
      }

      stopBundledYentingAudio();

      const audio=new Audio();
      activeBundledYentingAudio=audio;
      audio.preload='auto';
      audio.volume=volume;
      audio.playbackRate=1.22;
      audio.defaultPlaybackRate=1.22;
      audio.preservesPitch=true;
      audio.webkitPreservesPitch=true;
      audio.setAttribute('playsinline','');
      audio.src=bundledAudioObjectUrl(key,dataSource);
      audio.load();

      let finished=false;
      const finish=(failed=false)=>{
        if(finished) return;
        finished=true;
        if(activeBundledYentingAudio===audio){
          activeBundledYentingAudio=null;
        }
        failed ? onerror() : onend();
      };

      audio.onended=()=>finish(false);
      audio.onerror=()=>finish(true);

      try{
        const result=audio.play();
        if(result?.catch){
          result.catch(()=>finish(true));
        }
      }catch(error){
        finish(true);
      }

      return true;
    }

    function playVoice(text, element,{
      sender='彥廷',
      pitch,
      rate,
      volume=.95,
      language='auto'
    }={}){
      if(state.muted) return;

      voicePlaybackToken++;
      const token=voicePlaybackToken;

      if('speechSynthesis' in window){
        window.speechSynthesis.cancel();
      }
      stopBundledYentingAudio();

      document.querySelectorAll('.voice-message.playing').forEach(item=>{
        item.classList.remove('playing');
        const button=item.querySelector('.voice-play');
        if(button) button.textContent='▶';
      });

      const playButton=element?.querySelector('.voice-play');

      if(element) element.classList.add('playing');
      if(playButton) playButton.textContent='■';

      const finish=()=>{
        if(token!==voicePlaybackToken) return;
        if(element) element.classList.remove('playing');
        if(playButton) playButton.textContent='▶';
      };

      const useBundledMale=
        sender==='彥廷' && forceBundledYentingMale;

      if(useBundledMale){
        const started=playBundledYentingVoice(text,{
          volume,
          onend:finish,
          onerror:()=>{
            if(token!==voicePlaybackToken) return finish();
            beep('message');
            finish();
          }
        });

        if(started) return;
      }

      if(!('speechSynthesis' in window)){
        if(sender==='彥廷'){
          const started=playBundledYentingVoice(text,{
            volume,
            onend:finish,
            onerror:finish
          });
          if(started) return;
        }

        beep('message');
        return finish();
      }

      const segments=speechSegments(text,sender,language);

      const speakSegment=index=>{
        if(token!==voicePlaybackToken) return finish();
        if(index>=segments.length) return finish();

        const segment=segments[index];
        const utterance=new SpeechSynthesisUtterance(segment.text);
        if(segment.voice) utterance.voice=segment.voice;
        utterance.lang=segment.lang;

        const isYenting=sender==='彥廷';
        const defaultPitch=isYenting ? .76 : 1.02;
        const defaultRate=isYenting ? .98 : .98;
        const minPitch=isYenting ? .62 : .94;
        const maxPitch=isYenting ? .88 : 1.12;
        const minRate=isYenting ? .82 : .9;
        const maxRate=isYenting ? 1.08 : 1.08;

        utterance.pitch=Math.min(maxPitch,Math.max(minPitch,pitch ?? defaultPitch));
        utterance.rate=Math.min(maxRate,Math.max(minRate,rate ?? defaultRate));
        utterance.volume=volume;
        utterance.onend=()=>setTimeout(()=>speakSegment(index+1),55);
        utterance.onerror=finish;
        window.speechSynthesis.speak(utterance);
      };

      speakSegment(0);
    }

    function ringTonePulse(){
      if(state.muted) return;
      try{
        audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state==='suspended') audioCtx.resume();

        const start=audioCtx.currentTime;
        const notes=[
          {frequency:660,offset:0,duration:.18},
          {frequency:880,offset:.22,duration:.2},
          {frequency:660,offset:.52,duration:.18},
          {frequency:880,offset:.74,duration:.24}
        ];

        notes.forEach(note=>{
          const osc=audioCtx.createOscillator();
          const gain=audioCtx.createGain();
          osc.type='sine';
          osc.frequency.setValueAtTime(note.frequency,start+note.offset);
          gain.gain.setValueAtTime(.001,start+note.offset);
          gain.gain.exponentialRampToValueAtTime(.075,start+note.offset+.025);
          gain.gain.exponentialRampToValueAtTime(.001,start+note.offset+note.duration);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(start+note.offset);
          osc.stop(start+note.offset+note.duration+.03);
        });
      }catch(error){}
    }

    function startRingtone(){
      stopRingtone();

    function speakCallLine(text){
      return new Promise(resolve=>{
        if(state.muted){
          setTimeout(resolve,500);
          return;
        }

        voicePlaybackToken++;
        const token=voicePlaybackToken;

        if('speechSynthesis' in window){
          window.speechSynthesis.cancel();
        }
        stopBundledYentingAudio();

        if(forceBundledYentingMale){
          const started=playBundledYentingVoice(text,{
            volume:.96,
            onend:resolve,
            onerror:resolve
          });

          if(started) return;
        }

        if(!('speechSynthesis' in window)){
          const started=playBundledYentingVoice(text,{
            volume:.96,
            onend:resolve,
            onerror:resolve
          });

          if(started) return;
          setTimeout(resolve,500);
          return;
        }

        const segments=speechSegments(text,'彥廷','auto');

        const speakNext=index=>{
          if(token!==voicePlaybackToken){
            resolve();
            return;
          }
          if(index>=segments.length){
            resolve();
            return;
          }

          const segment=segments[index];
          const utterance=new SpeechSynthesisUtterance(segment.text);
          if(segment.voice) utterance.voice=segment.voice;
          utterance.lang=segment.lang;
          utterance.pitch=.74;
          utterance.rate=.98;
          utterance.volume=.96;
          utterance.onend=()=>setTimeout(()=>speakNext(index+1),70);
          utterance.onerror=()=>resolve();
          window.speechSynthesis.speak(utterance);
        };

        speakNext(0);
      });
    }

    function incomingCall({
      attempt=1,
      total=1,
      line='{name}，接電話。',
      timeout=7000
    }={}){
      return new Promise(resolve=>{
        let settled=false;
        let timeoutId;
        let connectedAt=0;

        const finish=result=>{
          if(settled) return;
          settled=true;
          clearTimeout(timeoutId);
          declineCall.removeEventListener('click',decline);
          acceptCall.removeEventListener('click',accept);
          hideCallOverlay();
          resolve(result);
        };

        const decline=()=>{
          if(callOverlay.classList.contains('connected')){
            const callLength=connectedAt ? performance.now()-connectedAt : 9999;
            voicePlaybackToken++;
            if('speechSynthesis' in window) window.speechSynthesis.cancel();
            stopBundledYentingAudio();
            finish(callLength<1900 ? 'quickHangup' : 'accepted');
            return;
          }
          finish('declined');
        };

        const accept=async()=>{
          if(settled) return;
          clearTimeout(timeoutId);
          stopRingtone();
          callOverlay.classList.remove('ringing');
          callOverlay.classList.add('connected');
          callStatus.textContent='通話中';
          declineLabel.textContent='掛斷';
          connectedAt=performance.now();
          startCallTimer();
          acceptCall.disabled=true;
          await speakCallLine(line);
          await wait(280);
          finish('accepted');
        };

        callAttempt.textContent=total>1 ? `第 ${attempt} 通來電` : '';
        callStatus.textContent='來電中⋯';
        callTimer.textContent='';
        callOverlay.classList.remove('hidden','connected');
        callOverlay.classList.add('ringing');

        declineCall.addEventListener('click',decline);
        acceptCall.addEventListener('click',accept);

        startRingtone();

        if(state.flags.willAnswerNext){
          state.flags.willAnswerNext=false;
          setTimeout(()=>accept(),780);
        }

        timeoutId=setTimeout(()=>finish('missed'),timeout);
      });
    }

    async function callBarrage({
      count=3,
      lines=[],
      timeout=6500
    }={}){
      choicesBox.innerHTML='';
      choiceArea.classList.add('hidden');

      for(let index=0;index<count;index++){
        const line=lines[index] || lines[lines.length-1] || '{name}，接電話。';
        const result=await incomingCall({
          attempt:index+1,
          total:count,
          line,
          timeout
        });

        if(result==='quickHangup'){
          await reactToQuickHangup();
        }else if(result==='accepted'){
          addSystem(`通話結束　${nowTime()}`,true,'yenting');
        }else{
          if(result==='declined') state.anger+=1;
          addSystem(`未接來電　彥廷　${nowTime()}`,true,'yenting');
        }

        if(index<count-1){
          advanceGameTime(1);
          await wait(520);
        }
      }
    }


    async function relentlessCalls({
      lines=[],
      timeout=5400,
      maxAttempts=7,
      pauseEvery=4
    }={}){
      choicesBox.innerHTML='';
      choiceArea.classList.add('hidden');

      let attempt=0;

      while(attempt<maxAttempts){
        attempt++;

        const line=lines[(attempt-1)%Math.max(1,lines.length)]
          || '{name}，接電話。';

        const result=await incomingCall({
          attempt,
          total:maxAttempts,
          line,
          timeout
        });

        if(result==='quickHangup'){
          await reactToQuickHangup();
          advanceGameTime(1);
          await wait(260);
          continue;
        }

        if(result==='accepted'){
          addSystem(`通話結束　${nowTime()}`,true,'yenting');
          state.flags.answeredRelentlessCall=true;
          return 'answered';
        }

        if(result==='declined') state.anger+=1;
        addSystem(`未接來電　彥廷　${nowTime()}`,true,'yenting');
        advanceGameTime(1);

        if(attempt%pauseEvery===0 && attempt<maxAttempts){
          const action=await choose([
            {
              id:'answerNext',
              text:'接起下一通。',
              action:true,
              delta:{courage:1}
            },
            {
              id:'keepRejecting',
              text:'繼續拒接。',
              action:true,
              delta:{anger:1,boundary:1}
            },
            {
              id:'powerOff',
              text:'直接關機。',
              action:true,
              delta:{courage:1,boundary:2}
            }
          ]);

          if(action==='powerOff'){
            state.flags.phonePoweredOff=true;
            addSystem('手機已關機。來電畫面消失。',false,'yenting');
            return 'poweredOff';
          }

          if(action==='answerNext'){
            state.flags.willAnswerNext=true;
          }
        }

        await wait(380);
      }

      state.flags.callsContinue=true;
      addSystem(`未接來電 ${maxAttempts} 通。螢幕熄滅後，又立刻亮起。`,true,'yenting');
      return 'stillCalling';
    }

    async function startChoiceIdleSpam(contact,token){
      if(contact!=='yenting'){
        if(
          token===choiceIdleToken &&
          !state.ended &&
          !choiceArea.classList.contains('hidden') &&
          choicesBox.children.length
        ){
          addMessage(
            'other',
            interpolate('妳超過 20 秒沒回了。不方便打字就先確認自己安全。'),
            {contact:'xiaoqing'}
          );
        }
        return;
      }

      const target=targetChat('yenting');
      const lines=idleSpamLines();

      if(activeContact==='yenting'){
        profileSub.textContent='持續傳送訊息中';
      }
      target.classList.add('panic-mode');

      try{
        for(let index=0;index<lines.length;index++){
          if(
            token!==choiceIdleToken ||
            state.ended ||
            choiceArea.classList.contains('hidden') ||
            !choicesBox.children.length
          ){
            break;
          }

          if(index>0 && index%6===0){
            advanceGameTime(1);
          }

          addMessage(
            'other',
            interpolate(lines[index]),
            {
              creepy:state.phase>=3 || state.anger>=5,
              spam:true,
              keepSameMinute:true,
              contact:'yenting'
            }
          );

          if(
            activeContact==='yenting' &&
            (index===2 || index===5 || index===lines.length-1)
          ){
            flashScreen();
          }

          await wait(Math.max(95,170-index*7));
        }
      }finally{
        if(activeContact==='yenting'){
          profileSub.textContent='上線中';
        }
        target.classList.remove('panic-mode');
      }
    }

    function scheduleChoiceIdleNudges(contact){
      clearChoiceIdleTimers();
      const token=choiceIdleToken;
      const startedAt=Date.now();
      let sentNine=false;
      let sentEighteen=false;
      let spamStarted=false;

      const choiceStillWaiting=()=>{
        return (
          token===choiceIdleToken &&
          !state.ended &&
          !choiceArea.classList.contains('hidden') &&
          choicesBox.children.length>0
        );
      };

      const sendNudge=(stage,elapsedSeconds)=>{
        if(!choiceStillWaiting()) return;

        addMessage(
          'other',
          interpolate(idleNudgeText(contact,stage,elapsedSeconds)),
          {
            creepy:contact==='yenting' && (state.phase>=3 || state.anger>=5),
            contact
          }
        );
      };

      const tick=()=>{
        if(!choiceStillWaiting()) return;
        const elapsed=Date.now()-startedAt;

        if(elapsed>=9000 && !sentNine){
          sentNine=true;
          sendNudge(1,9);
        }

        if(elapsed>=18000 && !sentEighteen){
          sentEighteen=true;
          sendNudge(2,18);
        }

        if(elapsed>=20000 && !spamStarted){
          spamStarted=true;
          startChoiceIdleSpam(contact,token);
        }
      };

      activeChoiceIdleTick=tick;
      const heartbeat=setInterval(tick,500);
      choiceIdleTimers.push(heartbeat);
      tick();
    }

    function choose(options){
      return new Promise(resolve=>{
        const choiceContact=activeContact;
        clearChoiceIdleTimers();
        choicesBox.innerHTML='';
        options.forEach((opt,index)=>{
          const btn=document.createElement('button');
          btn.className='choice-btn'+(opt.danger?' danger':'');
          btn.textContent=interpolate(opt.label || opt.text);
          btn.addEventListener('click',()=>{
            if(state.ended) return;
            clearChoiceIdleTimers();
            const content=interpolate(opt.sendText || opt.text);
            if(opt.action){
              addSystem(content,Boolean(opt.danger),choiceContact);
            }else{
              addMessage('mine',content,{contact:choiceContact});
            }
            choiceArea.classList.add('hidden');
            choicesBox.innerHTML='';
            if(opt.delta){
              Object.entries(opt.delta).forEach(([key,value])=>state[key]+=value);
            }
            if(opt.flag) state.flags[opt.flag]=true;
            resolve(opt.id);
          },{once:true});
          choicesBox.appendChild(btn);
          if(index<options.length-1){
            choicesBox.appendChild(document.createElement('div')).style.height='8px';
          }
        });
        choiceArea.classList.remove('hidden');
        scrollBottom(choiceContact);
        scheduleChoiceIdleNudges(choiceContact);
      });
    }

    function askSecretInput({
      placeholder='輸入口頭約定的暗號',
      buttonText='記住',
      maxLength=20,
      hint=''
    }={}){
      return new Promise(resolve=>{
        const choiceTitle=choiceArea.querySelector('.choice-title');
        const previousTitle=choiceTitle.textContent;
        choiceTitle.textContent='你與小晴當面約定暗號';
        choicesBox.innerHTML='';

        const wrapper=document.createElement('div');
        wrapper.className='custom-reply';

        const input=document.createElement('input');
        input.className='custom-reply-input';
        input.type='text';
        input.maxLength=maxLength;
        input.placeholder=placeholder;
        input.autocomplete='off';

        const send=document.createElement('button');
        send.className='custom-reply-send';
        send.type='button';
        send.textContent=buttonText;

        const finish=()=>{
          const value=input.value.trim();
          if(!value){
            input.focus();
            input.animate(
              [
                {transform:'translateX(0)'},
                {transform:'translateX(-5px)'},
                {transform:'translateX(5px)'},
                {transform:'translateX(0)'}
              ],
              {duration:220}
            );
            return;
          }

          choiceArea.classList.add('hidden');
          choicesBox.innerHTML='';
          choiceTitle.textContent=previousTitle;
          resolve(value);
        };

        send.addEventListener('click',finish);
        input.addEventListener('keydown',event=>{
          if(event.key==='Enter'){
            event.preventDefault();
            finish();
          }
        });

        wrapper.appendChild(input);
        wrapper.appendChild(send);
        choicesBox.appendChild(wrapper);

        if(hint){
          const hintNode=document.createElement('div');
          hintNode.className='custom-reply-hint';
          hintNode.textContent=hint;
          choicesBox.appendChild(hintNode);
        }

        choiceArea.classList.remove('hidden');
        setTimeout(()=>input.focus(),80);
      });
    }

    async function timeJump(label){
      await wait(450);

      const explicitTime=label.match(/(\d{1,2}):(\d{2})/);
      if(explicitTime){
        setGameTime(Number(explicitTime[1]),Number(explicitTime[2]));
      }

      if(label.includes('三週前')){
        state.phase=1;
        setGameTime(18,42);
      }else if(label.includes('一週前')){
        state.phase=2;
        setGameTime(12,36);
      }else if(label.includes('今天')){
        state.phase=Math.max(state.phase,3);
      }else if(label.includes('隔天')){
        state.phase=4;
        setGameTime(20,52);
      }else if(
        label.includes('天後') ||
        label.includes('週後') ||
        label.includes('月後')
      ){
        state.phase=5;
      }

      addDate(label,'yenting');
      addDate(label,'xiaoqing');
      await wait(350);
    }

    async function endGame(key){
      state.ended=true;
      clearChoiceIdleTimers();
      choiceArea.classList.add('hidden');
      choicesBox.innerHTML='';

      await playEndingSequence(key);

      const data=endings[key];
      const endingLabels={
        good:'好結局',
        bad:'壞結局',
        neutral:'未完結局'
      };
      endingCard.className=`card ending-card ${data.tone}`;
      endingType.textContent=endingLabels[data.tone] || '結局';
      endingTitle.textContent=data.title;
      endingText.textContent=interpolate(data.text + endingAftermath(key));
      endingText.scrollTop=0;
      await wait(650);
      endingOverlay.classList.remove('hidden');
      requestAnimationFrame(()=>{endingText.scrollTop=0;});
    }

            unlockAudio.currentTime=0;
            unlockAudio.volume=1;
          }).catch(()=>{});
        }
      }catch(error){}
      setGameTime(18,42);
      startOverlay.classList.add('hidden');
      Object.values(chats).forEach(thread=>thread.innerHTML='');
      unread.yenting=0;
      unread.xiaoqing=0;
      updateUnreadBadge('yenting');
      updateUnreadBadge('xiaoqing');
      switchChat('yenting',{animate:false});
      play();
    }


    startBtn.addEventListener('click',startGame);
    let nameInputComposing=false;
    let consumeImeEnter=false;

    nameInput.addEventListener('compositionstart',()=>{
      nameInputComposing=true;
    });

    nameInput.addEventListener('compositionend',()=>{
      nameInputComposing=false;
      consumeImeEnter=true;
    });

    nameInput.addEventListener('keydown',event=>{
      if(event.key!=='Enter') return;

      if(nameInputComposing || event.isComposing || event.keyCode===229){
        event.preventDefault();
        consumeImeEnter=true;
        return;
      }

      if(consumeImeEnter){
        event.preventDefault();
        consumeImeEnter=false;
        return;
      }

      event.preventDefault();
      startGame();
    });
    restartBtn.addEventListener('click',resetGame);
    againBtn.addEventListener('click',resetGame);
    soundBtn.addEventListener('click',()=>{
      state.muted=!state.muted;
      if(state.muted){
        stopRingtone();
        stopBundledYentingAudio();
      }
      if(state.muted && 'speechSynthesis' in window){
        voicePlaybackToken++;
        window.speechSynthesis.cancel();
        document.querySelectorAll('.voice-message.playing').forEach(el=>{
          el.classList.remove('playing');
          const button=el.querySelector('.voice-play');
          if(button) button.textContent='▶';
        });
      }
      soundBtn.textContent=state.muted?'🔇':'🔊';
    });

    document.addEventListener('visibilitychange',()=>{
      if(!document.hidden && !state.ended && state.name){
        showNotification('妳剛剛切去別的畫面？','yenting');
      }
    });
  </script>
</body>
</html>
